name: Deploy Backend to Oracle VM

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 168.107.51.242
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            # Ensure DART_PUSH_SECRET is in .env
            ENV_FILE=/home/ubuntu/news-hive/backend/.env
            if ! grep -q "DART_PUSH_SECRET" "$ENV_FILE" 2>/dev/null; then
              echo 'DART_PUSH_SECRET=${{ secrets.DART_PUSH_SECRET }}' >> "$ENV_FILE"
            fi
            /home/ubuntu/news-hive/deploy.sh
