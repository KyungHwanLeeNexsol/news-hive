name: Deploy Backend to Oracle VM

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 168.107.51.242
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            ENV_FILE=/home/ubuntu/news-hive/backend/.env
            # Ensure secrets are in .env
            if ! grep -q "DART_PUSH_SECRET" "$ENV_FILE" 2>/dev/null; then
              echo 'DART_PUSH_SECRET=${{ secrets.DART_PUSH_SECRET }}' >> "$ENV_FILE"
            fi
            if ! grep -q "GEMINI_API_KEY" "$ENV_FILE" 2>/dev/null; then
              echo 'GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}' >> "$ENV_FILE"
            fi
            /home/ubuntu/news-hive/deploy.sh
            # Wait for server to start, then check logs
            sleep 5
            echo "=== Server status ==="
            systemctl is-active newshive 2>/dev/null || echo "Not a systemd service"
            echo "=== Recent logs ==="
            journalctl -u newshive --no-pager -n 30 2>/dev/null || tail -30 /home/ubuntu/news-hive/backend/nohup.out 2>/dev/null || tail -30 /home/ubuntu/news-hive/backend/server.log 2>/dev/null || echo "No logs found"
            echo "=== Process check ==="
            pgrep -af uvicorn || echo "uvicorn not running!"
