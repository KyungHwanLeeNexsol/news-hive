name: Deploy Backend to Oracle VM
# DISABLED: Deployment now handled by GitHub webhook → /api/deploy endpoint
# See backend/app/main.py deploy_webhook()

on:
  workflow_dispatch: # Manual trigger only, if ever needed

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy backend
        run: |
          cd /home/ubuntu/news-hive
          git pull origin main
          /home/ubuntu/news-hive/deploy.sh
          sleep 5
          pgrep -af uvicorn || echo "uvicorn not running!"
