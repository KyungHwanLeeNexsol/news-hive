name: Deploy Backend to OCI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "scripts/deploy.sh"
      - "scripts/newshive.service"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          script_stop: true
          script: |
            bash /home/ubuntu/news-hive/scripts/deploy.sh
