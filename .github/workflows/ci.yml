name: CI/CD Pipeline

on:
  push:
    branches: [main]

# Node.js 24 사용 (Node.js 20 deprecation 대응)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 동일 브랜치에서 새 push 시 이전 실행 자동 취소
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # 변경 감지: backend / frontend / deploy 경로 판별
  # ──────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            deploy:
              - 'backend/**'
              - 'scripts/deploy.sh'
              - 'scripts/newshive.service'
              - '.github/workflows/ci.yml'

  # ──────────────────────────────────────────────
  # Job 1: 백엔드 테스트 (backend 변경 시만 실행)
  # ──────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    # SQLite 인메모리 DB 사용 (conftest.py 기본값)
    # PostgreSQL/Redis 서비스 컨테이너 불필요 → 시작 시간 ~2분 절감

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests (parallel)
        run: |
          cd backend
          python -m pytest tests/ -n 4 -q --tb=short

  # ──────────────────────────────────────────────
  # Job 2: 백엔드 린트 (backend 변경 시만 실행)
  # ──────────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: |
          cd backend
          ruff check app/

  # ──────────────────────────────────────────────
  # Job 3: 프론트엔드 체크 (frontend 변경 시만 실행)
  # ──────────────────────────────────────────────
  frontend-check:
    name: Frontend Check
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: TypeScript check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build verification
        run: |
          cd frontend
          npm run build

  # ──────────────────────────────────────────────
  # Job 4: OCI 배포 (테스트/린트 통과 후 실행)
  #   - backend 변경 시: backend-test + backend-lint 모두 성공 필요
  #   - scripts만 변경 시: CI 잡이 skipped → 바로 배포
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to OCI
    needs: [changes, backend-test, backend-lint]
    if: |
      always() &&
      needs.changes.outputs.deploy == 'true' &&
      (needs.backend-test.result == 'success' || needs.backend-test.result == 'skipped') &&
      (needs.backend-lint.result == 'success' || needs.backend-lint.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            bash /home/ubuntu/news-hive/scripts/deploy.sh
