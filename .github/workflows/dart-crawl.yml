name: DART Disclosure Crawl

on:
  schedule:
    # Run every 30 minutes during KST business hours (Mon-Fri 08:30-18:00 KST = 23:30-09:00 UTC)
    - cron: '*/30 0-9 * * 1-5'
    # Also run at night (catch late filings)
    - cron: '0 12 * * 1-5'
  workflow_dispatch: # Manual trigger

jobs:
  crawl:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install httpx

      - name: Crawl DART and push to server
        env:
          DART_PUSH_SECRET: ${{ secrets.DART_PUSH_SECRET }}
          API_URL: http://168.107.51.242:8000
        run: python scripts/dart_crawl_push.py
