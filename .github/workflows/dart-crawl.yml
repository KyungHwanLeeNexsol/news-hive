name: DART Disclosure Crawl
# OCI 서버 crontab으로 직접 실행 중 (KST 평일 장중 30분 간격)
# 수동 트리거만 활성화 (긴급 시 사용)

on:
  workflow_dispatch:

# Node.js 24 사용 (Node.js 20 deprecation 대응)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install httpx

      - name: Crawl DART and push to server
        env:
          DART_PUSH_SECRET: ${{ secrets.DART_PUSH_SECRET }}
          API_URL: http://${{ secrets.OCI_HOST }}:8000
        run: python scripts/dart_crawl_push.py
