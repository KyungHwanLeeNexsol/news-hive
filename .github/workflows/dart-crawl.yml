name: DART Disclosure Crawl
# DISABLED: Now running via crontab on Oracle server directly.
# See server crontab: */30 0-9 * * 1-5 (KST business hours)

on:
  workflow_dispatch: # Manual trigger only

jobs:
  crawl:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install httpx

      - name: Crawl DART and push to server
        env:
          DART_PUSH_SECRET: ${{ secrets.DART_PUSH_SECRET }}
          API_URL: http://168.107.51.242:8000
        run: python scripts/dart_crawl_push.py
