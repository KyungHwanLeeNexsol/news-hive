# OCI 프로덕션 배포용 Docker Compose
# 사용법: docker-compose -f docker-compose.prod.yml up -d --build
#
# 필수 환경변수 (backend/.env):
#   DATABASE_URL은 자동으로 아래 db 서비스를 가리키도록 설정됨
#   나머지 API 키는 backend/.env 파일에 설정

services:
  db:
    image: postgres:16-alpine
    container_name: news-hive-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-news_hive}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: news-hive-backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-news_hive}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
