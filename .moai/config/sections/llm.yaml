llm:
  # =================================================================
  # CG Mode: Claude (Leader) + Gemini (Teammates)
  # =================================================================
  # Leader (MoAI Orchestrator): Claude - planning, review, security
  # Teammates (Implementation): Gemini - coding, testing, docs
  # =================================================================
  mode: "cg"
  team_mode: "cg"
  glm_env_var: "GEMINI_API_KEY"

  # Leader performance tier (Claude models for orchestration)
  # high = Claude Opus for all leader tasks
  performance_tier: "high"

  # -----------------------------------------------------------------
  # Claude Models - LEADER (orchestration, planning, review, security)
  # -----------------------------------------------------------------
  claude_models:
    high: "opus"      # Plan/SPEC, architecture, security review, complex debugging
    medium: "sonnet"  # Code review, quality gates, documentation sync
    low: "haiku"      # Exploration, simple queries, hypothesis testing

  # -----------------------------------------------------------------
  # Gemini Models - TEAMMATES (implementation, testing, documentation)
  # Accessed via Anthropic-compatible proxy (OpenRouter or LiteLLM)
  # -----------------------------------------------------------------
  glm:
    # LiteLLM local proxy: Gemini API Key -> Anthropic-compatible endpoint
    # Start with: litellm --model gemini/gemini-2.5-pro --port 4000
    base_url: "http://localhost:4000"
    models:
      high: "google/gemini-2.5-pro"          # Complex implementation tasks
      medium: "google/gemini-2.5-flash"      # Standard coding, test generation
      low: "google/gemini-2.5-flash-lite"    # Bulk tasks, boilerplate, docs

  # -----------------------------------------------------------------
  # Task Allocation Strategy
  # -----------------------------------------------------------------
  # Phase     | LLM      | Model          | Reason
  # ----------|----------|----------------|--------------------------------
  # Plan      | Claude   | Opus           | Deep reasoning, EARS format
  # Strategy  | Claude   | Opus           | Architecture decisions
  # Security  | Claude   | Opus           | Vulnerability analysis
  # Debug     | Claude   | Sonnet         | Root cause analysis
  # Review    | Claude   | Sonnet         | Nuanced code quality
  # Backend   | Gemini   | 2.5 Pro        | Code generation, cost-effective
  # Frontend  | Gemini   | 2.5 Pro        | Component coding, patterns
  # Testing   | Gemini   | 2.5 Flash      | Bulk test writing
  # Docs      | Gemini   | 2.5 Flash      | Documentation generation
  # Explore   | Gemini   | 2.5 Flash      | Large context window (1M+)
