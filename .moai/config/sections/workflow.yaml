workflow:
    auto_clear:
        after_plan: true
        after_run: false
        enabled: true
        token_threshold: 150000
    completion:
        detect_in_output: true
        markers:
            complete: <moai>COMPLETE</moai>
            done: <moai>DONE</moai>
    execution_mode: team
    loop_prevention:
        failure_pattern_detection: true
        max_iterations: 100
        max_retries_per_operation: 3
    team:
        auto_selection:
            min_complexity_score: 7
            min_domains_for_team: 3
            min_files_for_team: 10
        default_model: sonnet
        delegate_mode: true
        enabled: true
        max_teammates: 10
        patterns:
            design_implementation:
                description: Cross-layer with UI/UX design (Gemini 2.5 Pro in CG mode)
                model: inherit
                roles:
                    - designer
                    - backend-dev
                    - frontend-dev
                    - tester
            full_stack:
                description: Full-stack implementation (Gemini 2.5 Pro in CG mode)
                model: inherit
                roles:
                    - api-layer
                    - ui-layer
                    - data-layer
                    - quality
            implementation:
                description: Cross-layer feature implementation (Gemini 2.5 Pro in CG mode)
                model: inherit
                roles:
                    - backend-dev
                    - frontend-dev
                    - tester
            investigation:
                description: Competing hypothesis debugging (Claude Haiku - fast, cost-effective)
                model: haiku
                roles:
                    - hypothesis-1
                    - hypothesis-2
                    - hypothesis-3
            plan_research:
                description: Parallel SPEC research and design (Claude Opus - deep reasoning)
                model: opus
                roles:
                    - researcher
                    - analyst
                    - architect
            review:
                description: Multi-perspective code review (Claude Sonnet - nuanced analysis)
                model: sonnet
                roles:
                    - security-reviewer
                    - perf-reviewer
                    - quality-reviewer
                    - ux-reviewer
        require_plan_approval: true
        role_profiles:
            analyst:
                description: Requirements analysis and validation
                isolation: none
                mode: plan
                model: sonnet
            architect:
                description: Solution design and architecture decisions
                isolation: none
                mode: plan
                model: sonnet
            designer:
                description: UI/UX design with MCP design tools
                isolation: worktree
                mode: acceptEdits
                model: sonnet
            implementer:
                description: Code implementation (backend, frontend, full-stack)
                isolation: worktree
                mode: acceptEdits
                model: sonnet
            researcher:
                description: Read-only codebase exploration and analysis
                isolation: none
                mode: plan
                model: haiku
            reviewer:
                description: Code review and quality validation
                isolation: none
                mode: plan
                model: haiku
            tester:
                description: Test creation and coverage validation
                isolation: worktree
                mode: acceptEdits
                model: sonnet
    token_budget:
        plan: 30000
        run: 180000
        sync: 40000
    worktree:
        auto_cleanup: true
        auto_create: true
        auto_merge: true
        session_name_pattern: moai-{ProjectName}-{SPEC-ID}
        tmux_preferred: true
